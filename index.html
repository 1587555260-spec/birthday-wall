<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>部门生日墙</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }

    body {
      font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
      background: #faf9f5;
      color: #1a1814;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: #ffffff;
      border-bottom: 1px solid #e8e4dc;
      padding: 28px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .header-left p { font-size: 13px; color: #a09c96; margin-top: 2px; }
    .header-stats { display: flex; gap: 20px; }
    .stat-chip { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat-chip .num { font-size: 20px; font-weight: 700; color: #e8704a; }
    .stat-chip .label { font-size: 11px; color: #a09c96; }

    /* ── Sync indicator ── */
    .sync-indicator {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #a09c96;
      padding: 5px 12px; border-radius: 20px;
      background: #f0ece5; cursor: pointer;
      transition: all 0.15s; user-select: none;
      white-space: nowrap;
    }
    .sync-indicator:hover { background: #e8e4dc; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; transition: background 0.3s; flex-shrink: 0; }
    .sync-dot-loading { background: #f0a030; animation: syncPulse 1s infinite; }
    .sync-dot-synced { background: #4caf50; }
    .sync-dot-error { background: #f44336; }
    @keyframes syncPulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* ── Main layout ── */
    .main { max-width: 1480px; margin: 0 auto; padding: 32px 40px 60px; display: flex; gap: 24px; align-items: flex-start; }
    .main-content { flex: 1; min-width: 0; }

    /* ── Sidebar ── */
    .sidebar { width: 280px; flex-shrink: 0; position: sticky; top: 100px; }
    .sidebar-card { background: #ffffff; border: 1.5px solid #e8e4dc; border-radius: 16px; padding: 22px 20px; margin-bottom: 16px; }
    .sidebar-card:last-child { margin-bottom: 0; }
    .sidebar-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .sidebar-subtitle { font-size: 11px; color: #a09c96; margin-bottom: 16px; }

    /* ── Food ranking ── */
    .ranking-list { display: flex; flex-direction: column; gap: 0; }
    .ranking-item { display: flex; align-items: center; gap: 10px; padding: 9px 8px; border-radius: 10px; transition: background 0.15s; cursor: default; position: relative; overflow: hidden; }
    .ranking-item:hover { background: #faf9f5; }
    .ranking-rank { width: 24px; height: 24px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; background: #f0ece5; color: #a09c96; }
    .ranking-item:nth-child(1) .ranking-rank { background: linear-gradient(135deg, #ffd700, #ffb700); color: #fff; }
    .ranking-item:nth-child(2) .ranking-rank { background: linear-gradient(135deg, #c0c0c0, #a8a8a8); color: #fff; }
    .ranking-item:nth-child(3) .ranking-rank { background: linear-gradient(135deg, #cd7f32, #b06820); color: #fff; }
    .ranking-icon { font-size: 20px; flex-shrink: 0; }
    .ranking-name { flex: 1; font-size: 13px; font-weight: 600; color: #1a1814; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ranking-count { font-size: 12px; font-weight: 700; color: #e8704a; flex-shrink: 0; display: flex; align-items: center; gap: 2px; }
    .ranking-bar { position: absolute; bottom: 0; left: 8px; right: 8px; height: 3px; border-radius: 2px; background: #e8704a; opacity: 0.15; transition: width 0.3s ease; }
    .ranking-empty { text-align: center; padding: 24px 0; color: #a09c96; font-size: 12px; }
    .ranking-empty .emoji { font-size: 32px; display: block; margin-bottom: 8px; }
    .ranking-summary { margin-top: 14px; padding-top: 14px; border-top: 1px solid #f2f0ec; font-size: 11px; color: #a09c96; text-align: center; }
    .ranking-summary b { color: #e8704a; }

    /* ── Spin Wheel ── */
    .wheel-card { background: #ffffff; border: 1.5px solid #e8e4dc; border-radius: 16px; padding: 22px 20px; margin-bottom: 16px; }
    .wheel-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .wheel-subtitle { font-size: 11px; color: #a09c96; margin-bottom: 14px; }
    .wheel-wrap { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
    .wheel-pointer {
      position: absolute;
      top: -8px; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 22px solid #e8704a;
      z-index: 10;
      filter: drop-shadow(0 2px 3px rgba(232,112,74,0.5));
    }
    #wheelCanvas { display: block; border-radius: 50%; box-shadow: 0 4px 24px rgba(0,0,0,0.14); }
    .wheel-btn {
      width: 100%; padding: 11px; border: none; border-radius: 12px;
      background: #e8704a; color: #fff; font-size: 14px; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .wheel-btn:hover:not(:disabled) { background: #d0603a; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(232,112,74,0.35); }
    .wheel-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
    .wheel-empty-hint { text-align: center; padding: 20px 0; color: #a09c96; font-size: 12px; }

    /* ── Section title ── */
    .section-title { font-size: 13px; font-weight: 600; color: #a09c96; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 16px; }

    /* ── Month Timeline ── */
    .timeline-section { background: #ffffff; border: 1.5px solid #e8e4dc; border-radius: 16px; padding: 28px 28px 20px; margin-bottom: 32px; }
    .timeline-title { font-size: 15px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .timeline-hint { font-size: 11px; color: #a09c96; font-weight: 400; margin-left: 8px; }
    .timeline-container { display: flex; gap: 0; position: relative; }
    .timeline-month-axis { display: flex; flex-direction: column; gap: 0; flex-shrink: 0; width: 64px; }
    .timeline-month-cell { height: 56px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #a09c96; position: relative; }
    .timeline-month-cell.current-month { color: #e8704a; font-weight: 700; }
    .timeline-month-cell.current-month::after { content:''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; background: #e8704a; }
    .timeline-body { flex: 1; border-left: 2px solid #e8e4dc; }
    .timeline-row { min-height: 56px; display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-bottom: 1px solid #f2f0ec; flex-wrap: wrap; transition: background 0.12s; }
    .timeline-row:last-child { border-bottom: none; }
    .timeline-row:hover { background: #faf9f5; }
    .timeline-row.current-month-row { background: #fdf0eb; padding-top: 14px; min-height: 64px; }
    .timeline-row.current-month-row:hover { background: #fce8e0; }
    .timeline-row.empty-row { color: #a09c96; font-size: 12px; font-style: italic; }
    .timeline-person { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: #faf9f5; border: 1px solid #e8e4dc; border-radius: 20px; font-size: 12px; font-weight: 500; color: #6b6660; transition: all 0.15s; cursor: pointer; }
    .timeline-person:hover { border-color: #e8704a; color: #e8704a; background: #fff8f5; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(232,112,74,0.15); }
    .tp-avatar { width: 20px; height: 20px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; overflow: hidden; }
    .tp-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .tp-avatar-emoji { font-size: 14px; font-weight: 400; background: #f0ece5; }
    .tp-avatar-product { background: #e05030; }
    .tp-avatar-marketing { background: #4070c0; }
    .tp-avatar-design { background: #4a9050; }
    .tp-foods { font-size: 12px; margin-left: 2px; }

    /* ── Birthday decoration on timeline avatar ── */
    .tp-avatar-wrap { position: relative; display: inline-flex; flex-shrink: 0; }
    .tp-birthday-deco {
      position: absolute;
      top: -9px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      line-height: 1;
      pointer-events: none;
      z-index: 2;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.18));
      animation: decoFloat 2.5s ease-in-out infinite;
    }
    @keyframes decoFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-3px); }
    }

    /* ── Month tabs ── */
    .month-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 36px; }
    .month-tab { padding: 7px 16px; border-radius: 20px; border: 1.5px solid #e8e4dc; background: #ffffff; font-size: 13px; font-weight: 500; color: #6b6660; cursor: pointer; transition: all 0.18s ease; position: relative; user-select: none; }
    .month-tab:hover { border-color: #e8704a; color: #e8704a; }
    .month-tab.active { background: #e8704a; border-color: #e8704a; color: #fff; }
    .month-tab .count-badge { display: inline-block; background: rgba(255,255,255,0.3); color: inherit; font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 4px; font-weight: 600; }
    .month-tab:not(.active) .count-badge { background: #fdf0eb; color: #e8704a; }
    .month-tab.all-tab.active { background: #1a1814; border-color: #1a1814; }

    /* ── Department filter ── */
    .dept-filters { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }
    .dept-btn { display: flex; align-items: center; gap: 7px; padding: 6px 14px; border-radius: 8px; border: 1.5px solid #e8e4dc; background: #ffffff; font-size: 13px; font-weight: 500; color: #6b6660; cursor: pointer; transition: all 0.18s ease; }
    .dept-btn .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dept-btn[data-dept="产品组"] .dot { background: #e8704a; }
    .dept-btn[data-dept="营销"] .dot  { background: #5b8fd4; }
    .dept-btn[data-dept="设计"] .dot  { background: #6ba56e; }
    .dept-btn:hover { border-color: #e8704a; color: #e8704a; }
    .dept-btn.active { border-color: #e8704a; color: #e8704a; }

    /* ── Cards grid ── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; align-items: start; }

    /* ── Person Card (collapsed by default) ── */
    .person-card {
      background: #ffffff;
      border: 1.5px solid #e8e4dc;
      border-radius: 16px;
      padding: 18px 18px 14px;
      transition: all 0.22s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: default;
      position: relative;
      overflow: hidden;
    }
    .person-card::before {
      content:''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: #e8e4dc; transition: height 0.22s ease;
    }
    .person-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06); transform: translateY(-2px); }
    .person-card:hover::before { height: 4px; }
    .person-card[data-dept="产品组"]::before { background: #e8704a; }
    .person-card[data-dept="营销"]::before  { background: #5b8fd4; }
    .person-card[data-dept="设计"]::before  { background: #6ba56e; }
    .person-card.jump-highlight { animation: jumpHighlight 1.5s ease; }
    @keyframes jumpHighlight { 0% { box-shadow: 0 0 0 0 rgba(232,112,74,0); } 20% { box-shadow: 0 0 0 4px rgba(232,112,74,0.5), 0 8px 32px rgba(232,112,74,0.25); transform: translateY(-4px); } 100% { box-shadow: 0 0 0 0 rgba(232,112,74,0); } }

    /* ── Collapsed header row (avatar + name only) ── */
    .card-collapsed-row {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
      padding: 2px 0;
    }
    .card-collapsed-row:hover .card-name { color: #e8704a; }

    .avatar-wrap { position: relative; flex-shrink: 0; cursor: pointer; display: inline-block; }
    .avatar { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-emoji-display { font-size: 28px; font-weight: 400; background: #f0ece5; }
    .avatar-product { background: linear-gradient(135deg, #f0856a, #e05030); }
    .avatar-marketing { background: linear-gradient(135deg, #70a3e0, #4070c0); }
    .avatar-design { background: linear-gradient(135deg, #7ac080, #4a9050); }
    .avatar-edit-hint { position: absolute; bottom: -3px; right: -3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; border: 1.5px solid #e8e4dc; display: flex; align-items: center; justify-content: center; font-size: 10px; line-height: 1; opacity: 0; transition: opacity 0.15s; pointer-events: none; }
    .avatar-wrap:hover .avatar-edit-hint { opacity: 1; }

    .card-name-area { flex: 1; min-width: 0; }
    .card-name {
      font-size: 15px; font-weight: 600; letter-spacing: -0.2px;
      cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
      border-radius: 6px; padding: 1px 4px; margin: -1px -4px;
      transition: background 0.15s; max-width: 100%;
    }
    .card-name:hover { background: #fdf0eb; }
    .card-name .edit-icon { font-size: 10px; color: #ccc; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
    .card-name:hover .edit-icon { opacity: 1; color: #e8704a; }
    .name-input {
      font-size: 14px; font-weight: 600; font-family: inherit;
      border: 1.5px solid #e8704a; border-radius: 8px;
      padding: 3px 8px; outline: none; color: #1a1814;
      background: #fff; width: 100%; max-width: 120px;
    }
    .card-expand-hint {
      font-size: 10px; color: #bbb; margin-top: 2px; letter-spacing: 0.2px;
    }

    /* ── Expanded card body ── */
    .card-expand-body {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
    }
    .person-card.expanded .card-expand-body {
      max-height: 600px;
      opacity: 1;
    }

    .card-expand-inner { padding-top: 14px; }

    /* dept + birthday in one row */
    .card-meta-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .card-dept-label { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 6px; }
    .person-card[data-dept="产品组"] .card-dept-label { background: #fdf0eb; color: #c45528; }
    .person-card[data-dept="营销"] .card-dept-label  { background: #eff4fc; color: #3460a0; }
    .person-card[data-dept="设计"] .card-dept-label  { background: #eff6f0; color: #3a7840; }

    .birthday-chip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; background: #faf9f5; border: 1px solid #e8e4dc; border-radius: 6px; font-size: 12px; font-weight: 600; color: #1a1814; }
    .countdown-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .countdown-badge.today { background: #fff3cd; color: #a06400; }
    .countdown-badge.soon { background: #fdf0eb; color: #c45528; }
    .countdown-badge.normal { background: #eff4fc; color: #2a5890; }
    .countdown-badge.passed { background: #f0f0f0; color: #999; }

    /* ── Food section inside expanded body ── */
    .food-section { margin-top: 4px; }
    .food-label { font-size: 11px; color: #a09c96; font-weight: 500; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
    .food-tags { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .food-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 6px 4px 10px; background: #faf9f5;
      border: 1px solid #e8e4dc; border-radius: 20px;
      font-size: 12px; font-weight: 500; color: #6b6660; transition: all 0.15s;
    }
    .food-tag:hover { background: #fff8f5; border-color: #e8704a; color: #e8704a; }
    .food-tag-del {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 50%;
      background: transparent; border: none; cursor: pointer;
      color: #bbb; font-size: 12px; line-height: 1;
      padding: 0; transition: all 0.15s; flex-shrink: 0;
    }
    .food-tag-del:hover { background: #e8704a; color: #fff; }
    .no-food { font-size: 12px; color: #a09c96; font-style: italic; }
    .add-food-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      border: 1.5px dashed #e8e4dc; background: transparent;
      color: #a09c96; font-size: 16px; cursor: pointer; transition: all 0.15s;
    }
    .add-food-btn:hover { border-color: #e8704a; color: #e8704a; background: #fdf0eb; transform: scale(1.1); }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.15s ease; }
    .modal-overlay.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal { background: #ffffff; border-radius: 18px; padding: 28px; width: 420px; max-width: 92vw; max-height: 80vh; overflow-y: auto; box-shadow: 0 24px 48px rgba(0,0,0,0.15); animation: slideUp 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close { width: 32px; height: 32px; border-radius: 8px; border: none; background: #faf9f5; color: #a09c96; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
    .modal-close:hover { background: #f0ece5; color: #1a1814; }
    .modal-subtitle { font-size: 12px; color: #a09c96; margin-bottom: 12px; }
    .food-category { margin-bottom: 14px; }
    .food-category-title { font-size: 11px; font-weight: 600; color: #a09c96; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
    .food-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .food-option { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; border: 1.5px solid #e8e4dc; border-radius: 20px; font-size: 12px; font-weight: 500; color: #6b6660; cursor: pointer; transition: all 0.15s; background: #ffffff; }
    .food-option:hover { border-color: #e8704a; color: #e8704a; background: #fdf0eb; }
    .food-option.selected { border-color: #e8704a; background: #e8704a; color: #fff; }
    .modal-custom { margin-top: 14px; padding-top: 14px; border-top: 1px solid #e8e4dc; }
    .custom-input-row { display: flex; gap: 8px; }
    .custom-input-row input { flex: 1; padding: 8px 12px; border: 1.5px solid #e8e4dc; border-radius: 10px; font-size: 13px; font-family: inherit; color: #1a1814; background: #faf9f5; outline: none; transition: border-color 0.15s; }
    .custom-input-row input:focus { border-color: #e8704a; }
    .custom-input-row button { padding: 8px 16px; border: none; border-radius: 10px; background: #e8704a; color: #fff; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; }
    .custom-input-row button:hover { background: #d0603a; }

    /* ── Modal footer & validate tip ── */
    .modal-validate-tip {
      margin-top: 10px; padding: 9px 14px; background: #fff3cd;
      border: 1px solid #f0c050; border-radius: 10px;
      font-size: 12px; color: #a06400; font-weight: 500;
    }
    .modal-validate-tip.hidden { display: none; }
    .food-category.missing .food-category-title {
      color: #e05030;
      animation: missingShake 0.4s ease;
    }
    @keyframes missingShake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    .modal-footer {
      margin-top: 16px; padding-top: 14px; border-top: 1px solid #e8e4dc;
      display: flex; justify-content: flex-end;
    }
    .modal-save-btn {
      padding: 10px 28px; border: none; border-radius: 10px;
      background: #e8704a; color: #fff; font-size: 14px; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: all 0.15s;
    }
    .modal-save-btn:hover { background: #d0603a; transform: translateY(-1px); }
    .modal-save-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── Avatar picker modal ── */

var shownAchievements = {};

try {
  var saved = localStorage.getItem('birthday-wall-achievements');
  if (saved) shownAchievements = JSON.parse(saved);
} catch(e) {}

function checkAchievements() {
  var counts = {};
  PEOPLE.forEach(function(p) {
    p.foods.forEach(function(f) { counts[f] = (counts[f] || 0) + 1; });
  });

  ACHIEVEMENTS.forEach(function(ach) {
    var triggered = Object.keys(counts).some(function(food) {
      return counts[food] >= ach.threshold;
    });
    if (triggered && !shownAchievements[ach.id]) {
      shownAchievements[ach.id] = true;
      try { localStorage.setItem('birthday-wall-achievements', JSON.stringify(shownAchievements)); } catch(e) {}
      // find the triggering food
      var triggerFood = Object.keys(counts).find(function(food) { return counts[food] >= ach.threshold; });
      var foodIcon = triggerFood ? (FOOD_ICONS[triggerFood] || '🍽️') : '';
      showAchievement(ach, triggerFood ? foodIcon + ' ' + triggerFood : '');
    }
  });
}

function showAchievement(ach, foodName) {
  var overlay = document.getElementById('achievement-overlay');
  var card = document.createElement('div');
  card.className = 'achievement-card';
  card.innerHTML =
    '<span class="achieve-icon">' + ach.icon + '</span>' +
    '<div class="achieve-text">' +
      '<div class="achieve-title">🏅 解锁成就：' + ach.title + '</div>' +
      '<div class="achieve-desc">' + ach.desc + (foodName ? ' (' + foodName + ')' : '') + '</div>' +
    '</div>';
  overlay.appendChild(card);
  card.onclick = function() { hideAchievementCard(card); };
  setTimeout(function() { hideAchievementCard(card); }, 5000);
}

function hideAchievementCard(card) {
  if (card.parentNode) {
    card.classList.add('hiding');
    setTimeout(function() { if (card.parentNode) card.parentNode.removeChild(card); }, 350);
  }
}

var cloudData = { foods: {}, avatars: {}, names: {}, version: 0, lastUpdated: 0 };
var isEditing = false;

function cloudGet() {
  return fetch(MANTLE_URL).then(function(r) {
    if (r.status === 404) return null;
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  });
}

function cloudPut(data) {
  return fetch(MANTLE_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  });
}

function applyCloudData(data) {
  cloudData = data || { foods: {}, avatars: {}, names: {}, version: 0, lastUpdated: 0 };
  if (!cloudData.names) cloudData.names = {};
  PEOPLE.forEach(function(p) {
    p.foods = (cloudData.foods[p.key] || []).slice();
    if (cloudData.names[p.key]) {
      p.name = cloudData.names[p.key];
    }
  });
}

function getAvatar(key) {
  return cloudData.avatars[key];
}

function updateSyncIndicator(status) {
  var el = document.getElementById('sync-indicator');
  if (!el) return;
  var dot = el.querySelector('.sync-dot');
  var text = el.querySelector('.sync-text');
  dot.className = 'sync-dot sync-dot-' + status;
  if (status === 'synced') text.textContent = '已同步';
  else if (status === 'loading') text.textContent = '同步中...';
  else if (status === 'error') text.textContent = '连接失败';
  else if (status === 'saving') text.textContent = '保存中...';
}

// 使用免版权轻音乐（Web Audio API 生成悠闲旋律）
var audioCtx = null;
var musicPlaying = false;
var musicNotes = null;
var musicScheduled = [];

// 悠闲旋律：C大调五声音阶，轻柔流畅
var MELODY = [
  // 主旋律片段（频率 Hz，时长 beat）
  [523, 0.5],[587, 0.5],[659, 0.5],[698, 0.5],
  [784, 1.0],[659, 0.5],[587, 0.5],[523, 1.0],
  [440, 0.5],[494, 0.5],[523, 0.5],[587, 0.5],
  [659, 1.5],[587, 0.5],
  [523, 0.5],[587, 0.5],[523, 0.5],[494, 0.5],
  [440, 2.0],
  [392, 0.5],[440, 0.5],[494, 0.5],[523, 0.5],
  [587, 1.0],[523, 0.5],[494, 0.5],[440, 1.0],
  [392, 0.5],[440, 0.5],[494, 0.5],[440, 0.5],
  [392, 2.0],
  [330, 0.5],[370, 0.5],[392, 0.5],[440, 0.5],
  [494, 1.0],[440, 0.5],[392, 0.5],[330, 1.5],
  [0, 0.5]
];

var BPM = 80;
var BEAT_DUR = 60 / BPM;

function initAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      showToast('浏览器不支持音频播放');
      return false;
    }
  }
  return true;
}

function playMelody() {
  if (!audioCtx) return;
  var startTime = audioCtx.currentTime + 0.1;
  var totalDur = 0;

  MELODY.forEach(function(note) {
    var freq = note[0], beats = note[1];
    var dur = beats * BEAT_DUR;
    if (freq > 0) {
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, startTime + totalDur);
      gain.gain.setValueAtTime(0, startTime + totalDur);
      gain.gain.linearRampToValueAtTime(0.08, startTime + totalDur + 0.05);
      gain.gain.linearRampToValueAtTime(0.06, startTime + totalDur + dur * 0.6);
      gain.gain.linearRampToValueAtTime(0, startTime + totalDur + dur - 0.05);
      osc.start(startTime + totalDur);
      osc.stop(startTime + totalDur + dur);
      musicScheduled.push(osc);
    }
    totalDur += dur;
  });

  // 循环播放
  if (musicPlaying) {
    musicNotes = setTimeout(playMelody, totalDur * 1000);
  }
}

function startMusic() {
  if (!initAudio()) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  musicPlaying = true;
  musicScheduled = [];
  playMelody();
  document.getElementById('music-player').textContent = '🎶';
  document.getElementById('music-player').classList.add('spinning');
  showToast('🎵 轻音乐已开启');
}

function stopMusic() {
  musicPlaying = false;
  clearTimeout(musicNotes);
  musicScheduled.forEach(function(osc) {
    try { osc.stop(); } catch(e) {}
  });
  musicScheduled = [];
  document.getElementById('music-player').textContent = '🎵';
  document.getElementById('music-player').classList.remove('spinning');
  showToast('🔇 音乐已暂停');
}

document.getElementById('music-player').onclick = function() {
  if (musicPlaying) {
    stopMusic();
  } else {
    startMusic();
  }
};

var wheelSpinning = false;
var wheelCurrentAngle = 0;
var wheelItems = [];

var WHEEL_COLORS = [
  '#e8704a','#f0a030','#5b8fd4','#6ba56e','#d47060',
  '#8b7ac8','#e0b040','#4ab0a0','#c06890','#60a860'
];

function getTop10Foods() {
  var counts = {};
  PEOPLE.forEach(function(p) {
    p.foods.forEach(function(f) { counts[f] = (counts[f] || 0) + 1; });
  });
  var sorted = Object.keys(counts).map(function(name) {
    return { name: name, count: counts[name], icon: FOOD_ICONS[name] || '🍽️' };
  }).sort(function(a, b) { return b.count - a.count; });
  return sorted.slice(0, 10);
}

function drawWheel(angle) {
  var canvas = document.getElementById('wheelCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var cx = W / 2, cy = H / 2, r = W / 2 - 4;
  ctx.clearRect(0, 0, W, H);

  if (wheelItems.length === 0) {
    ctx.fillStyle = '#f0ece5';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#a09c96';
    ctx.font = '13px PingFang SC, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('暂无美食数据', cx, cy);
    return;
  }

  var n = wheelItems.length;
  var slice = (Math.PI * 2) / n;

  for (var i = 0; i < n; i++) {
    var startAngle = angle + i * slice;
    var endAngle = startAngle + slice;

    // 扇形
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // 只画 emoji 图标（更大，居中偏向外侧）
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + slice / 2);
    // emoji 图标位置：从圆心偏移到 r * 0.6 处
    var iconRadius = r * 0.62;
    ctx.font = n <= 6 ? '26px sans-serif' : '22px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(wheelItems[i].icon, iconRadius, 0);
    ctx.restore();
  }

  // 中心圆
  ctx.beginPath();
  ctx.arc(cx, cy, 24, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#e8e4dc';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = '#1a1814';
  ctx.font = 'bold 13px PingFang SC, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('转！', cx, cy);
}

function renderWheel() {
  wheelItems = getTop10Foods();
  var spinBtn = document.getElementById('wheelSpinBtn');
  if (wheelItems.length === 0) {
    spinBtn.disabled = true;
    spinBtn.textContent = '还没有食物数据';
  } else {
    spinBtn.disabled = false;
    spinBtn.innerHTML = '🎲 开始转动！';
  }
  drawWheel(wheelCurrentAngle);
}

function startSpin() {
  if (wheelSpinning || wheelItems.length === 0) return;
  wheelSpinning = true;
  var spinBtn = document.getElementById('wheelSpinBtn');
  spinBtn.disabled = true;
  spinBtn.innerHTML = '⏳ 旋转中...';

  var n = wheelItems.length;
  var targetIndex = Math.floor(Math.random() * n);
  var slice = (Math.PI * 2) / n;

  var totalRotation = Math.PI * 2 * (5 + Math.random() * 3);
  var targetMid = -Math.PI / 2 - (targetIndex * slice + slice / 2);
  var finalAngle = wheelCurrentAngle + totalRotation;
  var finalMod = ((finalAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  var targetMod = ((targetMid % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  var diff = targetMod - finalMod;
  finalAngle += diff;
  if (finalAngle - wheelCurrentAngle < Math.PI * 8) finalAngle += Math.PI * 2 * Math.ceil((Math.PI * 8 - (finalAngle - wheelCurrentAngle)) / (Math.PI * 2));

  var startAngle = wheelCurrentAngle;
  var duration = 4000;
  var startTime = null;

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(ts) {
    if (!startTime) startTime = ts;
    var elapsed = ts - startTime;
    var progress = Math.min(elapsed / duration, 1);
    var easedProgress = easeOut(progress);
    wheelCurrentAngle = startAngle + (finalAngle - startAngle) * easedProgress;
    drawWheel(wheelCurrentAngle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      wheelCurrentAngle = finalAngle;
      wheelSpinning = false;
      spinBtn.disabled = false;
      spinBtn.innerHTML = '🎲 再转一次！';
      showSpinResult(targetIndex);
    }
  }

  requestAnimationFrame(animate);
}

function showSpinResult(index) {
  var item = wheelItems[index];
  if (!item) return;
  document.getElementById('spin-result-emoji').textContent = item.icon;
  document.getElementById('spin-result-name').textContent = item.name;
  document.getElementById('spin-result-overlay').classList.remove('hidden');
}

            '<div class="card-meta-row">' +
              '<span class="card-dept-label">' + esc(p.dept) + '</span>' +
              '<span class="birthday-chip">🎂 ' + p.month + ' 月</span>' +
              '<span class="countdown-badge ' + countdown.type + '">' + countdown.text + '</span>' +
            '</div>' +
            '<div class="food-section">' +
              '<div class="food-label">🍴 喜好食物</div>' +
              '<div class="food-tags">' +
                foodTagsHtml +
                '<button class="add-food-btn" data-key="' + esc(p.key) + '" title="添加食物">+</button>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';

      grid.appendChild(card);
    });
    bindCardEvents();
    applyFilters();
  }

  function renderFoodRanking() {
    var counts = {};
    PEOPLE.forEach(function(p) {
      p.foods.forEach(function(f) { counts[f] = (counts[f] || 0) + 1; });
    });
    var sorted = Object.keys(counts).map(function(name) {
      return { name: name, count: counts[name], icon: FOOD_ICONS[name] || '🍽️' };
    }).sort(function(a, b) { return b.count - a.count; });

    var top10 = sorted.slice(0, 10);
    var maxCount = top10.length > 0 ? top10[0].count : 1;
    var listEl = document.getElementById('ranking-list');
    var summaryEl = document.getElementById('ranking-summary');

    if (top10.length === 0) {
      listEl.innerHTML = '<div class="ranking-empty"><span class="emoji">🍽️</span>还没有人登记喜好<br>快去添加吧！</div>';
      summaryEl.innerHTML = '';
      renderWheel();
      return;
    }
    listEl.innerHTML = top10.map(function(item, i) {
      var barWidth = Math.round((item.count / maxCount) * 100);
      return '<div class="ranking-item">' +
        '<div class="ranking-rank">' + (i + 1) + '</div>' +
        '<span class="ranking-icon">' + item.icon + '</span>' +
        '<span class="ranking-name">' + esc(item.name) + '</span>' +
        '<span class="ranking-count">' + item.count + '人</span>' +
        '<div class="ranking-bar" style="width: calc(' + barWidth + '% - 16px);"></div>' +
      '</div>';
    }).join('');
    var totalFoods = sorted.length;
    var totalVotes = sorted.reduce(function(s, i) { return s + i.count; }, 0);
    summaryEl.innerHTML = '共 <b>' + totalFoods + '</b> 种美食 · <b>' + totalVotes + '</b> 人次选择';

    renderWheel();
    checkAchievements();
  }

  function renderAll() {
    renderCards();
    renderTimeline();
    renderFoodRanking();
  }

  function updateStats() {
    var allSorted = PEOPLE.slice().map(function(p) {
      return { name: p.name, countdown: getCountdown(p.month) };
    }).sort(function(a, b) { return a.countdown.months - b.countdown.months; });
    document.getElementById('total-count').textContent = PEOPLE.length;
    document.getElementById('this-month-count').textContent = monthCounts[todayMonth - 1] + ' 人';
    document.getElementById('next-birthday-text').textContent = allSorted[0].countdown.months === 0 ? '本月！' : allSorted[0].countdown.months + ' 月';
  }

  // ══════════════════════════
  //  SYNC (polling every 5s)
  // ══════════════════════════

  async function syncData() {
    try {
      updateSyncIndicator('loading');
      var data = await cloudGet();
      if (!data) return;
      var changed = JSON.stringify(cloudData.foods) !== JSON.stringify(data.foods) ||
                    JSON.stringify(cloudData.avatars) !== JSON.stringify(data.avatars) ||
                    JSON.stringify(cloudData.names) !== JSON.stringify(data.names);
      applyCloudData(data);
      if (changed && !isEditing) {
        renderAll();
      }
      updateSyncIndicator('synced');
    } catch (e) {
      console.error('同步失败:', e);
      updateSyncIndicator('error');
    }
  }

  // ══════════════════════════
  //  CARD EVENTS
  // ══════════════════════════

  function bindCardEvents() {
    // 折叠行点击 → 展开/收起整张卡片
    document.querySelectorAll('.card-collapsed-row').forEach(function(row) {
      row.onclick = function(e) {
        // 如果点的是头像或名字编辑区，不处理展开
        if (e.target.closest('.avatar-wrap') || e.target.closest('.card-name')) return;
        var card = row.closest('.person-card');
        if (card) card.classList.toggle('expanded');
      };
    });

    // 头像点击
    document.querySelectorAll('.avatar-wrap').forEach(function(wrap) {
      wrap.onclick = function(e) { e.stopPropagation(); e.preventDefault(); openAvatarModal(wrap.dataset.key); };
    });

    // 名字点击 → 编辑
    document.querySelectorAll('.card-name[data-key]').forEach(function(nameEl) {
      nameEl.onclick = function(e) {
        e.stopPropagation();
        // 先展开卡片再编辑
        var card = nameEl.closest('.person-card');
        if (card && !card.classList.contains('expanded')) card.classList.add('expanded');
        startNameEdit(nameEl.dataset.key, nameEl);
      };
    });

    // 食物 + 添加按钮
    document.querySelectorAll('.add-food-btn[data-key]').forEach(function(btn) {
      btn.onclick = function(e) {
        e.stopPropagation();
        openFoodModal(btn.dataset.key);
      };
    });

    // 食物快捷删除按钮
    document.querySelectorAll('.food-tag-del').forEach(function(btn) {
      btn.onclick = function(e) {
        e.stopPropagation();
        removeFood(btn.dataset.key, btn.dataset.food);
      };
    });
  }

  // ══════════════════════════
  //  REMOVE FOOD (quick delete)
  // ══════════════════════════

  async function removeFood(key, foodName) {
    try {
      updateSyncIndicator('saving');
      var data = await cloudGet();
      if (!data) data = { foods: {}, avatars: {}, names: {}, version: 0, lastUpdated: 0 };
      if (!data.foods[key]) data.foods[key] = [];
      var idx = data.foods[key].indexOf(foodName);
      if (idx >= 0) data.foods[key].splice(idx, 1);
      data.lastUpdated = Date.now();
      data.version = (data.version || 0) + 1;
      await cloudPut(data);
      applyCloudData(data);
      renderCards();
      renderTimeline();
      renderFoodRanking();
      updateSyncIndicator('synced');
      showToast('已删除 ' + foodName);
    } catch(e) {
      showToast('删除失败，请重试');
      updateSyncIndicator('error');
    }
  }

  // ══════════════════════════
  //  NAME EDIT IN-PLACE
  // ══════════════════════════

  function startNameEdit(key, nameEl) {
    if (nameEl.querySelector('input')) return;
    var p = PEOPLE.find(function(x) { return x.key === key; });
    if (!p) return;
    isEditing = true;

    var input = document.createElement('input');
    input.className = 'name-input';
    input.value = p.name;
    input.maxLength = 10;
    nameEl.innerHTML = '';
    nameEl.appendChild(input);
    input.focus();
    input.select();

    async function commitName() {
      var val = input.value.trim();
      if (!val) val = p.name;
      if (val !== p.name) {
        try {
          var data = await cloudGet();
          if (!data) data = { foods: {}, avatars: {}, names: {}, version: 0, lastUpdated: 0 };
          if (!data.names) data.names = {};
          data.names[key] = val;
          data.lastUpdated = Date.now();
          data.version = (data.version || 0) + 1;
          updateSyncIndicator('saving');
          await cloudPut(data);
          applyCloudData(data);
          updateSyncIndicator('synced');
          showToast('昵称已改为 ' + val);
        } catch(e) {
          showToast('保存失败，请重试');
        }
      }
      isEditing = false;
      renderAll();
    }

    input.onblur = commitName;
    input.onkeydown = function(e) {
      if (e.key === 'Enter') { input.blur(); }
      if (e.key === 'Escape') { input.value = p.name; input.blur(); }
    };
  }

  // ══════════════════════════
  //  FOOD MODAL
  // ══════════════════════════

  var foodModal = document.getElementById('food-modal');
  var foodModalClose = document.getElementById('modal-close');
  var foodModalPersonName = document.getElementById('modal-person-name');
  var foodModalFoodList = document.getElementById('modal-food-list');
  var foodModalSaveBtn = document.getElementById('modal-save-btn');
  var foodModalValidateTip = document.getElementById('modal-validate-tip');
  var currentModalPersonKey = null;
  // 弹窗中临时保存的选中食物（在点保存前不写云端）
  var modalTempFoods = [];

  function openFoodModal(key) {
    var p = PEOPLE.find(function(x) { return x.key === key; });
    if (!p) return;
    currentModalPersonKey = key;
    isEditing = true;
    // 初始化临时选中为当前用户的食物副本
    modalTempFoods = p.foods.slice();
    foodModalPersonName.textContent = '给 ' + p.name + ' 添加喜好食物';
    foodModalValidateTip.classList.add('hidden');
    foodModalValidateTip.textContent = '';
    renderModalFoodList();
    foodModal.classList.remove('hidden');
  }

  function closeFoodModal() {
    foodModal.classList.add('hidden');
    currentModalPersonKey = null;
    modalTempFoods = [];
    isEditing = false;
    syncData();
  }

  function renderModalFoodList() {
    foodModalFoodList.innerHTML = '';
    FOOD_CATEGORIES.forEach(function(cat) {
      var catDiv = document.createElement('div');
      catDiv.className = 'food-category';
      catDiv.dataset.catname = cat.name;
      catDiv.innerHTML = '<div class="food-category-title">' + cat.name + '</div>';
      var gridEl = document.createElement('div');
      gridEl.className = 'food-grid';
      cat.items.forEach(function(item) {
        var isSelected = modalTempFoods.indexOf(item.name) >= 0;
        var opt = document.createElement('span');
        opt.className = 'food-option' + (isSelected ? ' selected' : '');
        opt.innerHTML = item.icon + ' ' + item.name;
        opt.onclick = function() { toggleFoodTemp(item.name, opt); };
        gridEl.appendChild(opt);
      });
      catDiv.appendChild(gridEl);
      foodModalFoodList.appendChild(catDiv);
    });
  }

  // 临时切换选中状态（不写云端）
  function toggleFoodTemp(foodName, optEl) {
    var idx = modalTempFoods.indexOf(foodName);
    if (idx >= 0) {
      modalTempFoods.splice(idx, 1);
      optEl.classList.remove('selected');
    } else {
      modalTempFoods.push(foodName);
      optEl.classList.add('selected');
    }
    // 清除验证提示
    foodModalValidateTip.classList.add('hidden');
    document.querySelectorAll('.food-category.missing').forEach(function(el) {
      el.classList.remove('missing');
    });
  }

  // 点保存时验证每个类别至少选一项
  foodModalSaveBtn.onclick = async function() {
    // 验证：每个分类至少选一项
    var missingCats = [];
    FOOD_CATEGORIES.forEach(function(cat) {
      var hasOne = cat.items.some(function(item) { return modalTempFoods.indexOf(item.name) >= 0; });
      if (!hasOne) missingCats.push(cat.name);
    });

    if (missingCats.length > 0) {
      // 高亮缺失的分类
      document.querySelectorAll('.food-category').forEach(function(el) {
        if (missingCats.indexOf(el.dataset.catname) >= 0) {
          el.classList.add('missing');
          // 移除旧动画再重加，确保动画重播
          void el.querySelector('.food-category-title').offsetWidth;
        } else {
          el.classList.remove('missing');
        }
      });
      foodModalValidateTip.textContent = '⚠️ 请在以下类别中至少选一项：' + missingCats.join('、');
      foodModalValidateTip.classList.remove('hidden');
      // 滚动到第一个缺失分类
      var firstMissing = document.querySelector('.food-category.missing');
      if (firstMissing) firstMissing.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    // 验证通过，保存到云端
    foodModalSaveBtn.disabled = true;
    try {
      var data = await cloudGet();
      if (!data) data = { foods: {}, avatars: {}, names: {}, version: 0, lastUpdated: 0 };
      data.foods[currentModalPersonKey] = modalTempFoods.slice();
      data.lastUpdated = Date.now();
      data.version = (data.version || 0) + 1;
      updateSyncIndicator('saving');
      await cloudPut(data);
      applyCloudData(data);
      renderCards();
      renderTimeline();
      renderFoodRanking();
      updateSyncIndicator('synced');
      showToast('已保存 ' + modalTempFoods.length + ' 项食物偏好');
      closeFoodModal();
    } catch(e) {
      showToast('保存失败，请重试');
      updateSyncIndicator('error');
    }
    foodModalSaveBtn.disabled = false;
  };

  foodModalClose.onclick = closeFoodModal;
  foodModal.onclick = function(e) { if (e.target === foodModal) closeFoodModal(); };

  // ══════════════════════════
  //  AVATAR MODAL
  // ══════════════════════════

  var avatarModal = document.getElementById('avatar-modal');
  var avatarModalClose = document.getElementById('avatar-modal-close');
  var avatarModalName = document.getElementById('avatar-modal-name');
  var avatarPreview = document.getElementById('avatar-preview');
  var avatarList = document.getElementById('avatar-list');
  var avatarUploadBtn = document.getElementById('avatar-upload-btn');
  var avatarResetBtn = document.getElementById('avatar-reset-btn');
  var avatarConfirmBtn = document.getElementById('avatar-confirm-btn');
  var avatarFileInput = document.getElementById('avatar-file-input');

  var currentAvatarKey = null;
  var tempAvatarValue = null;
  var tempAvatarType = null;

  function openAvatarModal(key) {
    var p = PEOPLE.find(function(x) { return x.key === key; });
    if (!p) return;
    currentAvatarKey = key;
    avatarModalName.textContent = '为 ' + p.name + ' 选择头像';
    isEditing = true;
    var current = getAvatar(key);
    if (current) {
      tempAvatarValue = current;
      if (current.indexOf('data:') === 0) tempAvatarType = 'image';
      else if (current.length <= 4) tempAvatarType = 'emoji';
      else { tempAvatarType = 'default'; tempAvatarValue = null; }
    } else {
      tempAvatarValue = null;
      tempAvatarType = 'default';
    }
    renderAvatarPreview();
    renderAvatarList();
    avatarModal.classList.remove('hidden');
  }

  function closeAvatarModal() {
    avatarModal.classList.add('hidden');
    currentAvatarKey = null;
    tempAvatarValue = null;
    tempAvatarType = null;
    isEditing = false;
    syncData();
  }

  function renderAvatarPreview() {
    var p = PEOPLE.find(function(x) { return x.key === currentAvatarKey; });
    if (!p) return;
    var deptClass = getDeptClass(p.dept);
    var initials = p.name.slice(0, 1);
    var innerHtml;
    if (tempAvatarType === 'image' && tempAvatarValue) {
      innerHtml = '<div class="preview-circle"><img src="' + tempAvatarValue + '" alt="" /></div>';
    } else if (tempAvatarType === 'emoji' && tempAvatarValue) {
      innerHtml = '<div class="preview-circle" style="background:#f0ece5;">' + tempAvatarValue + '</div>';
    } else {
      innerHtml = '<div class="preview-circle avatar-' + deptClass + '">' + initials + '</div>';
    }
    avatarPreview.innerHTML = innerHtml + '<div class="preview-name">' + esc(p.name) + '</div>';
  }

  function renderAvatarList() {
    avatarList.innerHTML = '';
    AVATAR_CATEGORIES.forEach(function(cat) {
      var catDiv = document.createElement('div');
      catDiv.className = 'avatar-category';
      catDiv.innerHTML = '<div class="avatar-category-title">' + cat.name + '</div>';
      var gridEl = document.createElement('div');
      gridEl.className = 'avatar-grid';
      cat.items.forEach(function(emoji) {
        var opt = document.createElement('div');
        opt.className = 'avatar-option';
        if (tempAvatarType === 'emoji' && tempAvatarValue === emoji) opt.classList.add('selected');
        opt.textContent = emoji;
        opt.onclick = function() {
          tempAvatarValue = emoji;
          tempAvatarType = 'emoji';
          renderAvatarPreview();
          document.querySelectorAll('.avatar-option').forEach(function(o) { o.classList.remove('selected'); });
          opt.classList.add('selected');
        };
        gridEl.appendChild(opt);
      });
      catDiv.appendChild(gridEl);
      avatarList.appendChild(catDiv);
    });
  }

  avatarUploadBtn.onclick = function() { avatarFileInput.click(); };

  avatarFileInput.onchange = function(e) {
    var file = e.target.files[0];
    if (!file || !currentAvatarKey) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      tempAvatarValue = ev.target.result;
      tempAvatarType = 'image';
      renderAvatarPreview();
      document.querySelectorAll('.avatar-option').forEach(function(o) { o.classList.remove('selected'); });
    };
    reader.readAsDataURL(file);
    avatarFileInput.value = '';
  };

  avatarResetBtn.onclick = function() {
    tempAvatarValue = null;
    tempAvatarType = 'default';
    renderAvatarPreview();
    document.querySelectorAll('.avatar-option').forEach(function(o) { o.classList.remove('selected'); });
  };

  avatarConfirmBtn.onclick = async function() {
    if (!currentAvatarKey) return;
    try {
      var data = await cloudGet();
      if (!data) data = { foods: {}, avatars: {}, names: {}, version: 0, lastUpdated: 0 };
      var avatarToSend = (tempAvatarType === 'default' || !tempAvatarValue) ? null : tempAvatarValue;
      if (avatarToSend) {
        data.avatars[currentAvatarKey] = avatarToSend;
      } else {
        delete data.avatars[currentAvatarKey];
      }
      data.lastUpdated = Date.now();
      data.version = (data.version || 0) + 1;
      updateSyncIndicator('saving');
      await cloudPut(data);
      closeAvatarModal();
      applyCloudData(data);
      renderCards();
      renderTimeline();
      updateSyncIndicator('synced');
      showToast('头像已更新！');
    } catch (e) {
      showToast('保存失败，请重试');
      console.error(e);
    }
  };

  avatarModalClose.onclick = closeAvatarModal;
  avatarModal.onclick = function(e) { if (e.target === avatarModal) closeAvatarModal(); };

  // ══════════════════════════
  //  JUMP TO CARD
  // ══════════════════════════

  function jumpToCard(key) {
    var card = document.getElementById('card-' + key);
    if (!card) return;
    if (card.classList.contains('hidden')) {
      activeMonth = 0;
      activeDept = 'all';
      searchQuery = '';
      document.getElementById('search-input').value = '';
      document.querySelectorAll('.month-tab').forEach(function(t) {
        t.classList.toggle('active', parseInt(t.dataset.month) === 0);
      });
      document.querySelectorAll('.month-bar-wrap').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.dept-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.dept === 'all');
      });
      applyFilters();
    }
    var p = PEOPLE.find(function(x) { return x.key === key; });
    var displayName = p ? p.name : key;
    setTimeout(function() {
      card = document.getElementById('card-' + key);
      if (!card) return;
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.classList.add('expanded');
      card.classList.remove('jump-highlight');
      void card.offsetWidth;
      card.classList.add('jump-highlight');
      setTimeout(function() { card.classList.remove('jump-highlight'); }, 1600);
      showToast('已跳转到 ' + displayName + ' 的卡片');
    }, 100);
  }

  // ══════════════════════════
  //  FILTERS
  // ══════════════════════════

  function setMonthFilter(m) {
    activeMonth = m;
    document.querySelectorAll('.month-tab').forEach(function(t) {
      t.classList.toggle('active', parseInt(t.dataset.month) === m);
    });
    document.querySelectorAll('.month-bar-wrap').forEach(function(b) {
      b.classList.toggle('active', parseInt(b.dataset.month) === m);
    });
    applyFilters();
  }

  document.querySelectorAll('.dept-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      activeDept = btn.dataset.dept;
      document.querySelectorAll('.dept-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      applyFilters();
    });
  });

  document.getElementById('search-input').addEventListener('input', function(e) {
    searchQuery = e.target.value.trim();
    applyFilters();
  });

  function applyFilters() {
    var cards = document.querySelectorAll('.person-card');
    var visible = 0;
    cards.forEach(function(card) {
      var matchMonth = activeMonth === 0 || parseInt(card.dataset.month) === activeMonth;
      var matchDept = activeDept === 'all' || card.dataset.dept === activeDept;
      var matchSearch = !searchQuery || card.dataset.name.indexOf(searchQuery) >= 0;
      var show = matchMonth && matchDept && matchSearch;
      card.classList.toggle('hidden', !show);
      if (show) visible++;
    });
    var emptyEl = document.querySelector('.empty-state');
    if (visible === 0 && !emptyEl) {
      emptyEl = document.createElement('div');
      emptyEl.className = 'empty-state';
      emptyEl.innerHTML = '<span class="emoji">🔍</span>没有符合条件的同事';
      grid.appendChild(emptyEl);
    } else if (visible > 0 && emptyEl) {
      emptyEl.remove();
    }
    document.getElementById('total-count').textContent = visible;
  }

  // ══════════════════════════
  //  SPIN WHEEL EVENTS
  // ══════════════════════════

  document.getElementById('wheelSpinBtn').onclick = startSpin;

  document.getElementById('spin-result-close').onclick = function() {
    document.getElementById('spin-result-overlay').classList.add('hidden');
  };
  document.getElementById('spin-result-overlay').onclick = function(e) {
    if (e.target === document.getElementById('spin-result-overlay')) {
      document.getElementById('spin-result-overlay').classList.add('hidden');
    }
  };

  // ══════════════════════════
  //  SYNC INDICATOR CLICK
  // ══════════════════════════

  document.getElementById('sync-indicator').onclick = function() {
    syncData();
  };

  // ══════════════════════════
  //  KEYBOARD
  // ══════════════════════════

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (!foodModal.classList.contains('hidden')) closeFoodModal();
      if (!avatarModal.classList.contains('hidden')) closeAvatarModal();
      document.getElementById('spin-result-overlay').classList.add('hidden');
    }
  });

  // ══════════════════════════
  //  INITIAL RENDER
  // ══════════════════════════

  renderTimeline();
  renderMonthChart();
  renderMonthTabs();
  renderCards();
  renderFoodRanking();
  updateStats();

  if (monthCounts[todayMonth - 1] > 0) {
    document.querySelectorAll('.month-tab').forEach(function(t) {
      if (parseInt(t.dataset.month) === todayMonth) {
        t.style.boxShadow = '0 0 0 2px rgba(232,112,74,0.25)';
      }
    });
  }

  setInterval(syncData, 5000);

  console.log('✅ 部门生日墙已加载（MantleDB 云端共享模式）');
  console.log('👥 总人数：' + PEOPLE.length);
  console.log('🔄 数据每5秒自动同步');

})();
</script>
</body>
</html>
